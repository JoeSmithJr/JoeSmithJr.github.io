<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

        a{
            text-decoration:none;
        }
    </style>
</head>
<body>
<ul>Songs:</ul>
<ul>

    <p> <a href="../MP3/Vince%C2%A0Zhang%20-%20G小调的巴赫%20(Vince%20Moonrise%20Edit).mp3" onclick="return false">Vince Zhang - G小调的巴赫 (Vince Moonrise Edit)</a></p>

    <p><a href="../MP3/房东的猫%20-%20云烟成雨.mp3" onclick="return false">房东的猫 - 云烟成雨</a></p>

<audio src="../MP3/ハンバート ハンバート - 日が落ちるまで.mp3" id="myaudio" controls="controls" loop="false" hidden="true"/>
</body>
<script>
    $('a').on('click', function () {
        var url = $(this).attr('href');
        closePlay();
        $('#myaudio').attr("src",url);
        autoPlay();
    })
    function autoPlay() {
        var myAuto = $('#myaudio')[0];
        myAuto.play();
    }
    function closePlay() {
        var myAuto = $('#myaudio')[0];
        myAuto.pause();
        myAuto.load();
    }
</script>
</html>
