<h1 style="size: 25px" align="center">History</h1>

<script language="javascript" type="text/javascript">

    window.onload = function () {
        showTime();     //网页一加载就调用showTime()函数；
    }

    function checkTime(i) {  //补位处理
        if (i < 10) {
            i = "0" + i;     //当秒分小于10时，在左边补0；
        }
        return i;
    }

    function showTime() {
        var now = new Date();
        var year = now.getFullYear();
        var month = now.getMonth() + 1; //js获取的月份是从0开始；
        var day = now.getDate();
        var h = now.getHours();
        var m = now.getMinutes();
        var s = now.getSeconds();
        m = checkTime(m)
        s = checkTime(s)

        var weekday = new Array(7)
        weekday[0] = "星期日"
        weekday[1] = "星期一"
        weekday[2] = "星期二"
        weekday[3] = "星期三"
        weekday[4] = "星期四"
        weekday[5] = "星期五"
        weekday[6] = "星期六"
        var w = weekday[now.getDay()]; //js获取的星期是0~6,0是星期天；
        document.getElementById("show").innerHTML = "" + year + "年" + month + "月" + day + "日 " + w + "  " + h + ":" + m + ":" + s;
        t = setTimeout('showTime()', 500)
    }

</script>
<br><br><br><br>
<footer style="margin-right: 1px;margin-bottom: 1px;">
    <div class="content1">
        <div id="show"></div>
    </div>
</footer>
</body>
