<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game</title>
    <style type="text/css">
        table.gridtable {
            font-family: verdana,arial,sans-serif;
            font-size:11px;
            color:#333333;
            border-width: 1px;
            border-color: #666666;
            border-collapse: collapse;
        }
        table.gridtable th {
            border-width: 1px;
            padding: 8px;
            border-style: solid;
            border-color: #666666;
            background-color: #dedede;
        }
        table.gridtable td {
            border-width: 1px;
            padding: 8px;
            border-style: solid;
            border-color: #666666;
            background-color: #ffffff;
        }
    </style>
</head>
<style type="text/css">
    table {
        font-family: verdana,arial,sans-serif;
        font-size:16px;
        color:#333333;
        border-width: 1px;
        border-color: #666666;
        border-collapse: collapse;
        align-content: center;
    }
    table th{
        border-width: 1px;
        padding: 8px;
        border-style: solid;
        border-color: #666666;
        background-color: #dedede;
    }

</style>
<body>
<h4>Keep Following Up</h4>
<table border="2">
    <tr>
        <th>Date</th>
        <th>主管</th>
        <th>刀哥</th>
        <th>卓神</th>
        <th>慧投</th>
    </tr>
    <tr>
        <td>2019/01/04</td>
        <td bgcolor="#FF0000" >R</td>
        <td bgcolor="#FF0000">R</td>
        <td bgcolor="#FF0000">R</td>
        <td bgcolor="#FF0000">R</td>
    </tr>
    <tr>
        <td>2019/01/05</td>
        <td bgcolor="#000000">B</td>
        <td bgcolor="#FF0000">R</td>
        <td bgcolor="#FF0000">R</td>
        <td bgcolor="#00CD00">N</td>
    </tr>
    <tr>
        <td>2019/01/06</td>
        <td bgcolor="#00CD00">N</td>
        <td bgcolor="#000000">B</td>
        <td bgcolor="#FF0000">R</td>
        <td bgcolor="#000000">B</td>
    </tr>
    <tr>
        <td>2019/01/07</td>
        <td bgcolor="#00CD00">N</td>
        <td bgcolor="#00CD00">N</td>
        <td bgcolor="#00CD00">N</td>
        <td bgcolor="#00CD00">N</td>
    </tr>

</table>
<br><tfoot>R="Red" B="Black" N="None"</tfoot>
</body>
</html>
