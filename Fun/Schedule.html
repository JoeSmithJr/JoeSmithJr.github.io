<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial=scale=1">
    <title>动态表格</title>
    <link href="../css/bootstrap.min.css" type="text/css" rel="stylesheet">
    <link href="../css/layer.css" type="text/css" rel="stylesheet">
    <link href="../css/layout.css" type="text/css" rel="stylesheet">
    <title>Schedule</title>
</head>
<body>
<table class="table table-hover table-bordered" id="mytable">
    <thead>
    <tr>
        <th>选中</th>
        <th>事情</th>
        <th>开始时间</th>
        <th>结束时间</th>
        <th>日期</th>
        <th>完成情况</th>
        <th>操作</th>
    </tr>
    <tr>
        <td><input type="checkbox" onclick="checkAll(this)"/></td>
        <td colspan="6"><a href="javascript:;" class="btn btn-danger" role="button" onclick="delAll(this)">全部删除</a></td>
    </tr>
    </thead>
    <tbody id="listTable">
    <tr>
        <td><input type="checkbox" name="item"/></td>
        <td>背单词</td>
        <td>22:09</td>
        <td>23:09</td>
        <td>2019-01-14</td>
        <td>完成</td>
        <td>
            <input type="button" name="" value="删除" class="btn btn-danger" onclick="del(this)"/>
            <input type="button" name="" value="修改" class="btn btn-info" onclick="modify(this)"/>
        </td>
    </tr>
    </tbody>
</table>
<hr/>
<h1>添加日程</h1>
<form>
    <table class="table table-hover table-bordered">
        <tr>
            <th>事情</th>
            <td><input type="text" name="" class="form-control" id="num"/></td>
        </tr>
        <tr>
            <th>开始时间</th>
            <td><input type="time" name="" class="form-control" id="username"/></td>
        </tr>
        <tr>
            <th>结束时间</th>
            <td><input type="time" name="" class="form-control" id="pwd"/></td>
        </tr>
        <tr>
            <th>日期</th>
            <td><input type="date" name="" class="form-control" id="birth"/></td>
        </tr>
        <tr>
            <th>完成情况</th>
            <td>
                <input name="否" class="form-control" id="addre" type="radio" value="否" checked="checked"/>
                <input name="否" class="form-control" type="radio" value="是"/>
            </td>
        </tr>
        <tr>
            <td colspan="2">
                <input type="reset" value="重置" class="btn btn-primary" id="reset"/>
                <input type="button" value="添加" class="btn btn-success" id="add" onclick="addList()"/>
                <input type="button" value="更新" class="btn btn-info" id="" onclick="update()"/>
            </td>
        </tr>
    </table>
</form>
</body>
<script src="../js/table.js"></script>
<script src="../js/jquery.js"></script>
<script src="../js/layer.js"></script>
</html>
